<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — TheUnlockedWeb</title>
  <meta name="description" content="Play games made by EthanUnlocked's gaming hits.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">

  <style>
    /* ── Page header ─────────────────────────── */
    .page-header {
      padding: 52px 0 44px;
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 12px;
    }
    .page-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(2rem, 7vw, 3.8rem);
      line-height: 1; letter-spacing: -0.03em;
      background: linear-gradient(140deg, #fff 0%, #f5f3ff 20%, var(--gold) 48%, var(--gold-soft) 68%, #fff 88%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 7s .4s linear infinite, fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }
    .page-sub {
      font-size: .88rem; color: var(--sub); font-weight: 500;
      animation: fadeUp .6s .15s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Games grid ──────────────────────────── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      animation: fadeUp .6s .2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Game card ───────────────────────────── */
    .game-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .22s, transform .22s cubic-bezier(.22,1,.36,1), box-shadow .22s;
      cursor: pointer;
    }
    .game-card:hover {
      border-color: var(--border-h);
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }
    .game-card.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(245,158,11,.25), 0 16px 40px rgba(0,0,0,.45);
    }

    /* Preview area */
    .game-preview {
      position: relative;
      width: 100%; padding-top: 56.25%;
      background: #080814; overflow: hidden;
    }
    .game-preview-bg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      transition: opacity .22s;
    }
    .game-preview-icon {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      transition: transform .3s cubic-bezier(.22,1,.36,1);
    }
    .game-card:hover .game-preview-icon { transform: scale(1.12) rotate(-4deg); }
    .game-preview-label {
      font-family: 'Syne', sans-serif; font-size: .72rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }

    /* Play overlay */
    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.45);
      opacity: 0; transition: opacity .22s;
    }
    .game-card:hover .play-overlay { opacity: 1; }
    .play-circle {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--gold); color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; padding-left: 3px;
      transform: scale(.8);
      transition: transform .22s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 0 30px rgba(245,158,11,.5);
    }
    .game-card:hover .play-circle { transform: scale(1); }

    /* Card body */
    .game-body {
      padding: 18px 20px; display: flex; flex-direction: column; gap: 6px;
    }
    .game-title {
      font-family: 'Syne', sans-serif; font-size: 1rem;
      font-weight: 700; color: var(--text);
    }
    .game-desc { font-size: .81rem; color: var(--sub); line-height: 1.6; }
    .game-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .game-tag {
      font-size: .64rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
    }

    /* ── Game launcher ───────────────────────── */
    .launcher {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity .28s cubic-bezier(.22,1,.36,1);
    }
    .launcher.open {
      opacity: 1; pointer-events: all;
    }

    .launcher-bar {
      height: 52px; flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 14px;
    }
    .launcher-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .95rem; color: var(--text);
      flex: 1;
    }
    .launcher-actions { display: flex; align-items: center; gap: 8px; }

    .lbtn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Manrope', sans-serif; font-size: .75rem; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; cursor: pointer; border: 1px solid;
      transition: background .16s, transform .16s;
      text-decoration: none;
    }
    .lbtn:hover { transform: translateY(-1px); }
    .lbtn-close { background: rgba(239,68,68,.12); color: #f87171; border-color: rgba(239,68,68,.25); }
    .lbtn-close:hover { background: rgba(239,68,68,.22); }
    .lbtn-fullscreen { background: var(--gold-gl); color: var(--gold); border-color: rgba(245,158,11,.25); }
    .lbtn-fullscreen:hover { background: rgba(245,158,11,.22); }
    .lbtn-open { background: var(--purple-gl); color: var(--purple); border-color: rgba(88,101,242,.25); }
    .lbtn-open:hover { background: rgba(88,101,242,.22); }

    .launcher-frame {
      flex: 1; width: 100%; border: none;
      background: #000;
      transform: scale(.98); opacity: 0;
      transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s;
    }
    .launcher.open .launcher-frame {
      transform: scale(1); opacity: 1;
    }

    /* Loading state inside launcher */
    .launcher-loading {
      position: absolute; inset: 52px 0 0 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      color: var(--sub); font-size: .85rem;
      pointer-events: none;
    }
    .launcher-loading i { font-size: 1.6rem; color: var(--gold); }

    @media (max-width: 520px) {
      .games-grid { grid-template-columns: 1fr; }
      .lbtn span { display: none; }
      .lbtn { padding: 6px 10px; }
    }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="aurora" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Nav -->
<nav class="nav">
  <a href="../" class="nav-brand">TUW</a>
  <div class="nav-divider"></div>
  <div class="nav-links">
    <a href="../">Home</a>
    <a href="../videos/">Videos</a>
    <a href="./" class="active">Games</a>
  </div>
  <div class="nav-socials">
    <a href="https://www.youtube.com/channel/UCi8DgxMDGJ-Qsjqfdi-uoIw" class="nav-pill nav-pill-yt" target="_blank">
      <i class="fa-brands fa-youtube"></i> YouTube
    </a>
    <a href="https://discord.gg/vBMNDBTFn" class="nav-pill nav-pill-dc" target="_blank">
      <i class="fa-brands fa-discord"></i> Discord
    </a>
  </div>
</nav>

<div class="wrap">
  <header class="page-header">
    <div class="chip"><span class="chip-dot"></span>Made by EthanUnlocked</div>
    <h1 class="page-title">Games</h1>
    <p class="page-sub">Click any game to play it right here — no new tab needed.</p>
  </header>

  <div class="games-grid" id="gamesGrid"></div>
</div>

<footer>
  <span class="f-brand">TheUnlockedWeb</span>
  <span class="f-copy">© 2025 EthanUnlocked's gaming hits</span>
  <div class="f-links">
    <a href="https://github.com/EthanUnlocked690/EthanUnlocked690.github.io" target="_blank">
      <i class="fa-brands fa-github"></i> Source
    </a>
  </div>
</footer>

<!-- Launcher overlay -->
<div class="launcher" id="launcher">
  <div class="launcher-bar">
    <span class="launcher-title" id="launcherTitle">Game</span>
    <div class="launcher-actions">
      <a class="lbtn lbtn-open" id="launcherOpen" href="#" target="_blank">
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
        <span>Open tab</span>
      </a>
      <button class="lbtn lbtn-fullscreen" id="launcherFullscreen">
        <i class="fa-solid fa-expand"></i>
        <span>Fullscreen</span>
      </button>
      <button class="lbtn lbtn-close" id="launcherClose">
        <i class="fa-solid fa-xmark"></i>
        <span>Close</span>
      </button>
    </div>
  </div>
  <div class="launcher-loading" id="launcherLoading">
    <i class="fa-solid fa-circle-notch spin"></i>
    Loading game...
  </div>
  <iframe
    id="launcherFrame"
    class="launcher-frame"
    title="Game"
    allowfullscreen
    allow="fullscreen; autoplay"
  ></iframe>
</div>

<script>
  /* ── Load games from JSON ───────────────── */
  const grid = document.getElementById('gamesGrid');

  fetch('../json/games.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(games => {
      if (!games.length) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted)">
            <i class="fa-solid fa-gamepad" style="font-size:2rem;display:block;margin-bottom:14px"></i>
            No games yet — add some to json/games.json
          </div>`;
        return;
      }
      games.forEach((g, i) => buildCard(g, i));
    })
    .catch(err => {
      grid.innerHTML = `
        <div style="grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted)">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;display:block;margin-bottom:14px"></i>
          Could not load games.json — ${err.message}
        </div>`;
    });

  /* ── Build a single card ────────────────── */
  function buildCard(g, i) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.animation = `fadeUp .5s ${.1 + i * .08}s cubic-bezier(.22,1,.36,1) both`;

    const tagHTML = (g.tags || []).map(t =>
      `<span class="game-tag tag-${t.color}">${t.label}</span>`
    ).join('');

    // Build icon fallback element
    const iconEl = document.createElement('div');
    iconEl.className = 'game-preview-bg';
    iconEl.innerHTML = `
      <div class="game-preview-icon" style="background:${g.iconBg};color:${g.iconColor}">
        <i class="${g.icon}"></i>
      </div>
      <span class="game-preview-label">${g.title}</span>`;

    // Preview container
    const preview = document.createElement('div');
    preview.className = 'game-preview';

    if (g.thumbnail) {
      const img = document.createElement('img');
      img.alt = g.title;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.85);transition:transform .35s cubic-bezier(.22,1,.36,1),filter .35s';
      img.onerror = () => {
        img.remove();
        preview.insertBefore(iconEl, preview.firstChild);
      };
      img.src = "../assets/resources/game_thumbnails/" + g.thumbnail; // set src AFTER onerror so it fires correctly
      preview.appendChild(img);

      card.addEventListener('mouseenter', () => {
        if (preview.querySelector('img')) {
          img.style.transform = 'scale(1.06)';
          img.style.filter = 'brightness(1)';
        }
      });
      card.addEventListener('mouseleave', () => {
        if (preview.querySelector('img')) {
          img.style.transform = '';
          img.style.filter = 'brightness(.85)';
        }
      });
    } else {
      preview.appendChild(iconEl);
    }

    // Play overlay
    preview.insertAdjacentHTML('beforeend', `
      <div class="play-overlay">
        <div class="play-circle"><i class="fa-solid fa-play"></i></div>
      </div>`);

    card.appendChild(preview);
    card.insertAdjacentHTML('beforeend', `
      <div class="game-body">
        <div class="game-title">${g.title}</div>
        <div class="game-desc">${g.desc}</div>
        <div class="game-tags">${tagHTML}</div>
      </div>`);

    card.addEventListener('click', () => openGame(g));
    grid.appendChild(card);
  }

  /* ── Launcher ───────────────────────────── */
  const launcher         = document.getElementById('launcher');
  const launcherTitle    = document.getElementById('launcherTitle');
  const launcherFrame    = document.getElementById('launcherFrame');
  const launcherOpen     = document.getElementById('launcherOpen');
  const launcherLoading  = document.getElementById('launcherLoading');
  const launcherClose    = document.getElementById('launcherClose');
  const launcherFullscr  = document.getElementById('launcherFullscreen');

  function openGame(g) {
    launcherTitle.textContent = g.title;
    launcherOpen.href = g.url;
    launcherFrame.src = '';
    launcherLoading.style.display = 'flex';
    launcher.classList.add('open');
    document.body.style.overflow = 'hidden';

    // The Proxy logic:
    // Using AllOrigins "raw" API to get the site content directly
    const proxiedUrl = `https://api.allorigins.win{encodeURIComponent(g.url)}`;

    setTimeout(() => {
      // If the game is flagged for proxying, use the proxied version
      launcherFrame.src = g.useProxy ? proxiedUrl : g.url;
    }, 120);
  }

  launcherFrame.addEventListener('load', () => {
    launcherLoading.style.display = 'none';
  });

  function closeGame() {
    launcher.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { launcherFrame.src = ''; }, 300);
  }

  launcherClose.addEventListener('click', closeGame);

  // Close on background click (outside bar)
  launcher.addEventListener('click', e => {
    if (e.target === launcher) closeGame();
  });

  // Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeGame();
  });

  // Fullscreen
  launcherFullscr.addEventListener('click', () => {
    if (launcherFrame.requestFullscreen) launcherFrame.requestFullscreen();
    else if (launcherFrame.webkitRequestFullscreen) launcherFrame.webkitRequestFullscreen();
  });
</script>
</body>
</html>

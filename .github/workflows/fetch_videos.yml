name: Fetch YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch videos and write JSON
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, sys, re
          from datetime import datetime

          CHANNEL = 'https://www.youtube.com/channel/UCi8DgxMDGJ-Qsjqfdi-uoIw/videos/'

          headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept-Language': 'en-US,en;q=0.9',
          }

          print(f'Fetching {CHANNEL}')
          req = urllib.request.Request(CHANNEL, headers=headers)
          with urllib.request.urlopen(req, timeout=20) as r:
            html = r.read().decode('utf-8')

          # YouTube embeds all page data as a JS variable
          match = re.search(r'var ytInitialData\s*=\s*(\{.+?\});</script>', html, re.DOTALL)
          if not match:
            print('Could not find ytInitialData in page', file=sys.stderr)
            print('HTML snippet:', html[:500])
            sys.exit(1)

          data = json.loads(match.group(1))

          # Navigate the nested structure to find video items
          tabs = data.get('contents', {}) \
                     .get('twoColumnBrowseResultsRenderer', {}) \
                     .get('tabs', [])

          video_items = []
          for tab in tabs:
            tab_content = tab.get('tabRenderer', {}).get('content', {})
            section_list = tab_content.get('richGridRenderer', {}) \
                                      .get('contents', [])
            for item in section_list:
              vi = item.get('richItemRenderer', {}) \
                       .get('content', {}) \
                       .get('videoRenderer', {})
              if vi:
                video_items.append(vi)

          print(f'Found {len(video_items)} videos')

          videos = []
          for vi in video_items:
            vid_id = vi.get('videoId', '')
            title  = vi.get('title', {}).get('runs', [{}])[0].get('text', '')
            length = vi.get('lengthText', {}).get('simpleText', '')
            date_str = vi.get('publishedTimeText', {}).get('simpleText', '')

            # Detect shorts by duration (≤60s)
            total_secs = 0
            if length:
              parts = length.split(':')
              try:
                if len(parts) == 2:
                  total_secs = int(parts[0]) * 60 + int(parts[1])
                elif len(parts) == 3:
                  total_secs = int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
              except:
                pass
            is_short = (total_secs > 0 and total_secs <= 60) or '#short' in title.lower()

            thumb = f'https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg'

            videos.append({
              'id':        vid_id,
              'title':     title,
              'url':       f'https://www.youtube.com/watch?v={vid_id}',
              'thumbnail': thumb,
              'published': date_str,
              'isShort':   is_short,
            })

          if not videos:
            print('No videos parsed — channel may have no public videos or YouTube changed its page structure')

          os.makedirs('json', exist_ok=True)
          with open('json/videos.json', 'w') as f:
            json.dump(videos, f, indent=2)

          print(f'Wrote {len(videos)} videos to json/videos.json')
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/videos.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update videos.json [skip ci]"
            git push
          fi

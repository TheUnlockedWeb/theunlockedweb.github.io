<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — TheUnlockedWeb</title>
  <meta name="description" content="Real-time community chat for TheUnlockedWeb.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="icon" type="image/x-icon" href="../assets/resources/favicon.ico">

  <style>
    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    body { overflow: hidden; }

    .chat-shell {
      position: fixed;
      top: var(--nav-h, 58px); left: 0; right: 0; bottom: 0;
      z-index: 2;
      display: flex;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Sidebar ─────────────────────── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: rgba(6,6,13,.92);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 16px 0;
      backdrop-filter: blur(20px);
    }

    .sidebar-section {
      padding: 0 14px;
      font-size: .62rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin: 16px 0 6px;
    }

    .room-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; margin: 0 6px;
      border-radius: 8px; cursor: pointer; border: none;
      background: none; color: var(--sub);
      font-family: 'Manrope', sans-serif; font-size: .84rem; font-weight: 600;
      width: calc(100% - 12px); text-align: left;
      transition: background .15s, color .15s;
    }
    .room-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
    .room-btn.active { background: var(--gold-gl); color: var(--gold); }
    .room-btn i { width: 16px; text-align: center; font-size: .9rem; }

    /* Online count */
    .online-pill {
      margin: auto 14px 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: .72rem; color: var(--muted);
      font-family: 'Manrope', sans-serif; font-weight: 500;
    }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); animation: pulse 2s infinite; }

    /* User card at sidebar bottom */
    .sidebar-user {
      margin: 6px 8px 0;
      padding: 10px 10px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .85rem;
      background: var(--gold-gl); color: var(--gold);
      border: 1px solid rgba(245,158,11,.25);
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: .8rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-email { font-size: .66rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .signout-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .85rem; flex-shrink: 0;
      transition: color .15s, transform .15s;
      padding: 4px;
    }
    .signout-btn:hover { color: #f87171; transform: rotate(10deg); }

    /* ── Main chat area ──────────────── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }

    /* Room header */
    .chat-header {
      height: 52px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(6,6,13,.7);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
    }
    .chat-header-icon { color: var(--gold); font-size: 1rem; }
    .chat-header-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; color: var(--text);
    }
    .chat-header-desc { font-size: .75rem; color: var(--muted); margin-left: 4px; }

    /* Messages */
    .messages-wrap {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 2px;
      scroll-behavior: smooth;
    }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Day divider */
    .day-divider {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0 6px; color: var(--muted);
      font-size: .68rem; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Message row */
    .msg {
      display: flex; gap: 12px;
      padding: 3px 8px; border-radius: 8px;
      transition: background .15s;
    }
    .msg:hover { background: rgba(255,255,255,.03); }
    .msg.grouped { padding-top: 1px; }
    .msg.grouped .msg-meta { display: none; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .82rem;
      margin-top: 2px;
    }
    .msg.grouped .msg-avatar { visibility: hidden; }

    .msg-content { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
    .msg-author {
      font-family: 'Syne', sans-serif; font-size: .86rem; font-weight: 700; color: var(--text);
    }
    .msg-time { font-size: .67rem; color: var(--muted); font-weight: 500; }
    .msg-text {
      font-size: .88rem; color: var(--text); line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-text a { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }

    /* Own messages highlight */
    .msg.own .msg-author { color: var(--gold); }

    /* System message */
    .msg-system {
      text-align: center; padding: 6px 0;
      font-size: .72rem; color: var(--muted); font-style: italic;
    }

    /* Typing indicator */
    .typing-indicator {
      padding: 6px 8px;
      font-size: .75rem; color: var(--muted); font-style: italic;
      min-height: 28px;
    }
    .typing-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); margin: 0 1.5px;
      animation: typingBounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity:.4; }
      30%          { transform: translateY(-5px); opacity:1; }
    }

    /* Input bar */
    .input-bar {
      padding: 12px 16px 14px;
      background: rgba(6,6,13,.7);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within {
      border-color: rgba(245,158,11,.4);
      box-shadow: 0 0 0 3px rgba(245,158,11,.07);
    }
    .chat-input {
      flex: 1; background: none; border: none; outline: none; resize: none;
      font-family: 'Manrope', sans-serif; font-size: .88rem; font-weight: 500;
      color: var(--text); line-height: 1.5; max-height: 120px;
    }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      background: var(--gold); color: #000; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .85rem;
      transition: background .15s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
    }
    .send-btn:hover { background: #fbbf24; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(245,158,11,.3); }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { opacity: .3; cursor: default; transform: none !important; box-shadow: none !important; }

    .input-hint {
      font-size: .68rem; color: var(--muted); padding: 0 2px;
      display: flex; align-items: center; gap: 10px;
    }
    .checking-badge {
      display: none; align-items: center; gap: 5px;
      color: var(--purple); font-size: .7rem; font-weight: 600;
    }
    .checking-badge.visible { display: flex; }
    .char-count { margin-left: auto; }

    /* ══════════════════════════════════════════
       AUTH OVERLAY
    ══════════════════════════════════════════ */
    .auth-overlay {
      position: fixed; inset: var(--nav-h, 58px) 0 0;
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-overlay.hidden { display: none; }

    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px 32px;
      width: 94%; max-width: 400px;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    .auth-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-soft));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .auth-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.6rem;
      color: var(--text); margin-bottom: 6px;
    }
    .auth-sub { font-size: .82rem; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .auth-tab {
      flex: 1; padding: 9px 0; border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .8rem;
      background: none; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .auth-tab.active { background: var(--gold-gl); color: var(--gold); }

    .auth-field { margin-bottom: 14px; }
    .auth-field label {
      display: block; font-size: .7rem; font-weight: 600; color: var(--gold);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); padding: 10px 13px;
      font-family: 'Manrope', sans-serif; font-size: .88rem;
      transition: border-color .15s, box-shadow .15s;
    }
    .auth-field input:focus {
      outline: none; border-color: rgba(245,158,11,.5);
      box-shadow: 0 0 0 3px rgba(245,158,11,.07);
    }

    .auth-error {
      font-size: .78rem; color: #f87171; min-height: 20px; margin: 6px 0;
      font-family: 'Manrope', sans-serif;
    }

    .auth-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: var(--gold); color: #000;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .92rem;
      cursor: pointer; margin-top: 6px;
      transition: background .15s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
    }
    .auth-btn:hover { background: #fbbf24; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,.3); }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 80px; left: 50%; z-index: 100;
      transform: translateX(-50%) translateY(10px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: .82rem; font-weight: 500; color: var(--text);
      font-family: 'Manrope', sans-serif;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>

<!-- ══════════════════════════════════════════════════
     FIREBASE + APP SCRIPT
══════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  updateProfile,
  onAuthStateChanged,
  signOut,
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getDatabase, ref, push, onChildAdded, onChildRemoved,
  serverTimestamp, query, limitToLast, onDisconnect, set, remove,
  onValue,
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ══════════════════════════════════════════════════
   ⚙️  CONFIG — paste your Firebase config here
   (same project as suggestions if you want, or new)
══════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId:         "YOUR_PROJECT",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID",
};

/* ⚙️  Groq API key */
const GROQ_API_KEY = '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';

/* ══════════════════════════════════════════════════
   ROOM META
══════════════════════════════════════════════════ */
const ROOMS = {
  'general':     'General chat for everyone',
  'gaming':      'Talk about games',
  'suggestions': 'Feature requests & ideas',
  'off-topic':   'Anything goes',
};

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser  = null;
let currentRoom  = 'general';
let unsubMessages = null;
let typingTimer   = null;
let isTyping      = false;

/* Avatar colour ramp (deterministic from uid) */
const AVATAR_COLOURS = [
  ['rgba(245,158,11,.18)', '#f59e0b'],
  ['rgba(88,101,242,.18)', '#818cf8'],
  ['rgba(52,211,153,.18)', '#34d399'],
  ['rgba(56,189,248,.18)', '#38bdf8'],
  ['rgba(244,114,182,.18)', '#f472b6'],
];
function avatarStyle(uid = '') {
  const i = uid.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % AVATAR_COLOURS.length;
  return AVATAR_COLOURS[i];
}
function initials(name = '') {
  return name.split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?';
}

/* ══════════════════════════════════════════════════
   AUTH STATE
══════════════════════════════════════════════════ */
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    showChat(user);
  } else {
    document.getElementById('authOverlay').classList.remove('hidden');
    document.getElementById('chatShell').style.display = 'none';
  }
});

function showChat(user) {
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('chatShell').style.display = 'flex';

  const [bg, fg] = avatarStyle(user.uid);
  const av = document.getElementById('userAvatar');
  av.textContent         = initials(user.displayName || user.email);
  av.style.background    = bg;
  av.style.color         = fg;
  av.style.borderColor   = fg + '44';
  document.getElementById('userName').textContent  = user.displayName || 'Anonymous';
  document.getElementById('userEmail').textContent = user.email;

  loadRoom('general');
  trackPresence(user);
}

/* ══════════════════════════════════════════════════
   PRESENCE (online count)
══════════════════════════════════════════════════ */
function trackPresence(user) {
  const presRef = ref(db, `presence/${user.uid}`);
  set(presRef, { name: user.displayName || 'Anonymous', ts: serverTimestamp() });
  onDisconnect(presRef).remove();

  onValue(ref(db, 'presence'), snap => {
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    document.getElementById('onlineCount').textContent = count + ' online';
  });
}

/* ══════════════════════════════════════════════════
   ROOMS
══════════════════════════════════════════════════ */
window.switchRoom = function(btn) {
  document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadRoom(btn.dataset.room);
};

function loadRoom(room) {
  currentRoom = room;
  document.getElementById('roomName').textContent = room;
  document.getElementById('roomDesc').textContent = ROOMS[room] || '';
  document.getElementById('chatInput').placeholder = `Message #${room}...`;
  document.getElementById('messagesWrap').innerHTML = '';

  // Detach previous listener
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }

  // Load last 80 messages
  const msgsRef = query(ref(db, `messages/${room}`), limitToLast(80));
  let first = true;
  unsubMessages = onChildAdded(msgsRef, snap => {
    appendMessage(snap.val(), snap.key, first);
    if (first) {
      scrollToBottom(false);
      first = false;
    } else {
      scrollToBottom(true);
    }
  });
}

/* ══════════════════════════════════════════════════
   MESSAGES
══════════════════════════════════════════════════ */
let lastAuthorId = null;
let lastDay      = null;

function appendMessage(msg, key, noScroll = false) {
  const wrap = document.getElementById('messagesWrap');

  // Day divider
  const day = new Date(msg.ts || Date.now()).toLocaleDateString('en-AU', { weekday:'long', month:'long', day:'numeric' });
  if (day !== lastDay) {
    lastDay = day;
    lastAuthorId = null;
    const div = document.createElement('div');
    div.className = 'day-divider';
    div.textContent = day;
    wrap.appendChild(div);
  }

  // System message
  if (msg.type === 'system') {
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = msg.text;
    wrap.appendChild(el);
    return;
  }

  const grouped = msg.uid === lastAuthorId;
  lastAuthorId  = msg.uid;

  const isOwn = currentUser && msg.uid === currentUser.uid;
  const [avBg, avFg] = avatarStyle(msg.uid || '');
  const timeStr = new Date(msg.ts || Date.now()).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  const el = document.createElement('div');
  el.className = `msg${grouped ? ' grouped' : ''}${isOwn ? ' own' : ''}`;
  el.dataset.key = key;
  el.innerHTML = `
    <div class="msg-avatar" style="background:${avBg};color:${avFg};border:1px solid ${avFg}44">
      ${esc(initials(msg.author))}
    </div>
    <div class="msg-content">
      <div class="msg-meta">
        <span class="msg-author">${esc(msg.author)}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-text">${linkify(esc(msg.text))}</div>
    </div>`;

  wrap.appendChild(el);
}

function scrollToBottom(smooth = true) {
  const wrap = document.getElementById('messagesWrap');
  wrap.scrollTo({ top: wrap.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

/* ══════════════════════════════════════════════════
   TYPING INDICATOR (DB-based)
══════════════════════════════════════════════════ */
function setTyping(active) {
  if (!currentUser) return;
  const tRef = ref(db, `typing/${currentRoom}/${currentUser.uid}`);
  if (active) {
    set(tRef, { name: currentUser.displayName || 'Someone', ts: Date.now() });
    onDisconnect(tRef).remove();
  } else {
    remove(tRef);
  }
  isTyping = active;
}

// Watch others typing
onValue(ref(db, 'typing'), () => {}); // warm up; overridden per room in loadRoom

function watchTyping(room) {
  onValue(ref(db, `typing/${room}`), snap => {
    if (!snap.exists()) {
      document.getElementById('typingIndicator').innerHTML = '';
      return;
    }
    const others = Object.entries(snap.val())
      .filter(([uid]) => uid !== currentUser?.uid)
      .map(([, v]) => v.name);
    if (!others.length) {
      document.getElementById('typingIndicator').innerHTML = '';
      return;
    }
    const names = others.slice(0, 3).join(', ');
    document.getElementById('typingIndicator').innerHTML =
      `<span style="color:var(--muted);font-style:italic;font-size:.75rem">${esc(names)} ${others.length === 1 ? 'is' : 'are'} typing </span>
       <span class="typing-dots"><span></span><span></span><span></span></span>`;
  });
}

/* ══════════════════════════════════════════════════
   GROQ MODERATION
══════════════════════════════════════════════════ */
async function moderate(text) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      max_tokens: 60,
      temperature: 0,
      messages: [
        {
          role: 'system',
          content: `You are a moderator for a gaming community chat (TheUnlockedWeb) for a YouTube creator who makes gaming/LEGO content. 
REJECT if: NSFW, hate speech, slurs, threats, spam, repeated nonsense, self-promotion with links, or doxxing.
ACCEPT if: anything relevant — gaming chat, friendly banter, compliments, reactions, questions, gaming content, etc.
Be lenient. Short messages like "lol", "gg", "nice" are fine. Only block genuinely harmful content.
Respond ONLY with raw JSON — no markdown. {"ok":true} or {"ok":false,"reason":"short reason"}`
        },
        { role: 'user', content: `Chat message: "${text}"` }
      ]
    })
  });
  if (!res.ok) return { ok: true }; // fail open on API error
  const data = await res.json();
  const raw  = data.choices?.[0]?.message?.content?.trim() ?? '';
  try { return JSON.parse(raw.replace(/```json|```/g, '').trim()); }
  catch { return { ok: true }; }
}

/* ══════════════════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════════════════ */
async function sendMessage() {
  const input  = document.getElementById('chatInput');
  const text   = input.value.trim();
  const sendBtn = document.getElementById('sendBtn');
  const checkBadge = document.getElementById('checkingBadge');

  if (!text || !currentUser) return;
  if (text.length > 500) { showToast('❌ Message too long (max 500 chars)'); return; }

  sendBtn.disabled = true;
  checkBadge.classList.add('visible');
  setTyping(false);

  try {
    const result = await moderate(text);
    checkBadge.classList.remove('visible');

    if (!result.ok) {
      showToast('❌ ' + (result.reason || 'Message blocked by moderation.'));
      sendBtn.disabled = false;
      return;
    }

    await push(ref(db, `messages/${currentRoom}`), {
      uid:    currentUser.uid,
      author: currentUser.displayName || 'Anonymous',
      text,
      ts:     Date.now(),
    });

    input.value = '';
    input.style.height = '';
    document.getElementById('charCount').textContent = '0 / 500';
    sendBtn.disabled = true;
  } catch (e) {
    console.error(e);
    checkBadge.classList.remove('visible');
    showToast('❌ Failed to send — try again.');
    sendBtn.disabled = false;
  }
}

/* ══════════════════════════════════════════════════
   INPUT EVENTS
══════════════════════════════════════════════════ */
const chatInput = document.getElementById('chatInput');
const sendBtn   = document.getElementById('sendBtn');

chatInput.addEventListener('input', () => {
  const val = chatInput.value;
  document.getElementById('charCount').textContent = val.length + ' / 500';
  sendBtn.disabled = val.trim().length === 0;

  // Auto-resize
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';

  // Typing indicator
  clearTimeout(typingTimer);
  if (val.trim()) {
    if (!isTyping) setTyping(true);
    typingTimer = setTimeout(() => setTyping(false), 2500);
  } else {
    setTyping(false);
  }
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

document.getElementById('sendBtn').addEventListener('click', sendMessage);

/* ══════════════════════════════════════════════════
   AUTH FORMS
══════════════════════════════════════════════════ */
window.switchTab = function(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').classList.toggle('active',  isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  document.getElementById('formLogin').style.display  = isLogin ? '' : 'none';
  document.getElementById('formSignup').style.display = isLogin ? 'none' : '';
};

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; return; }
  document.getElementById('loginBtn').disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
    document.getElementById('loginBtn').disabled = false;
  }
});
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// Signup
document.getElementById('signupBtn').addEventListener('click', async () => {
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPass').value;
  const errEl = document.getElementById('signupError');
  errEl.textContent = '';
  if (!name || !email || !pass) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (name.length < 2) { errEl.textContent = 'Name must be at least 2 characters.'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  document.getElementById('signupBtn').disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // Refresh currentUser so displayName is available immediately
    currentUser = auth.currentUser;
    showToast('Welcome to the chat, ' + name + '! 🎉');
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
    document.getElementById('signupBtn').disabled = false;
  }
});

// Sign out
document.getElementById('signoutBtn').addEventListener('click', async () => {
  setTyping(false);
  if (currentUser) {
    await remove(ref(db, `presence/${currentUser.uid}`));
  }
  await signOut(auth);
  showToast('Signed out. See ya! 👋');
});

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function friendlyAuthError(code) {
  const map = {
    'auth/user-not-found':          'No account found with that email.',
    'auth/wrong-password':          'Incorrect password.',
    'auth/email-already-in-use':    'An account with this email already exists.',
    'auth/invalid-email':           'Invalid email address.',
    'auth/weak-password':           'Password is too weak.',
    'auth/too-many-requests':       'Too many attempts. Try again later.',
    'auth/network-request-failed':  'Network error — check your connection.',
    'auth/invalid-credential':      'Invalid email or password.',
  };
  return map[code] || 'Something went wrong. Try again.';
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkify(str) {
  return str.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
window.showToast = showToast;

/* Patch loadRoom to also watch typing */
const _origLoad = loadRoom;
// eslint-disable-next-line no-global-assign
window._loadRoomRef = loadRoom;

// Override to wire typing watcher each time room changes
const origLoadRoom = loadRoom;
function loadRoomFull(room) {
  origLoadRoom(room);
  watchTyping(room);
}
// Wire room buttons
document.querySelectorAll('.room-btn').forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadRoomFull(btn.dataset.room);
  };
});

</script>

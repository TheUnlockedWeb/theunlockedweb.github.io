<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions — TheUnlockedWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="icon" href="../assets/resources/favicon.ico">
  <style>
    body { overflow: hidden; }

    /* ── Physics arena ─────────────────────── */
    .arena {
      position: fixed;
      top: var(--nav-h, 58px); left: 0; right: 0; bottom: 0;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Bubble ────────────────────────────── */
    .bubble {
      position: absolute;
      max-width: 220px; min-width: 100px;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid;
      font-family: 'Manrope', sans-serif;
      font-size: .82rem; font-weight: 500;
      line-height: 1.5;
      cursor: grab;
      user-select: none;
      transform: translate(-50%, -50%);
      transition: box-shadow .2s, border-color .2s;
      will-change: transform;
      word-break: break-word;
    }
    .bubble:active { cursor: grabbing; }
    .bubble.grabbed {
      box-shadow: 0 16px 40px rgba(0,0,0,.5);
      z-index: 50 !important;
    }

    .bubble-text { margin-bottom: 6px; color: var(--text); }
    .bubble-meta {
      font-size: .68rem; font-weight: 600;
      letter-spacing: .5px; opacity: .55;
    }

    /* Colour variants */
    .bubble.c-gold   { background: rgba(245,158,11,.1);  border-color: rgba(245,158,11,.3);  color: var(--gold);   }
    .bubble.c-purple { background: rgba(88,101,242,.1);  border-color: rgba(88,101,242,.3);  color: var(--purple); }
    .bubble.c-green  { background: rgba(52,211,153,.1);  border-color: rgba(52,211,153,.3);  color: var(--green);  }
    .bubble.c-blue   { background: rgba(56,189,248,.1);  border-color: rgba(56,189,248,.3);  color: #38bdf8;       }
    .bubble.c-pink   { background: rgba(244,114,182,.1); border-color: rgba(244,114,182,.3); color: #f472b6;       }

    /* Entrance animation */
    @keyframes popIn {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
      70%  { transform: translate(-50%,-50%) scale(1.08); }
      100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    .bubble.entering { animation: popIn .45s cubic-bezier(.22,1,.36,1) forwards; }

    /* ── Submit form ───────────────────────── */
    .submit-wrap {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; gap: 10px; align-items: flex-end;
      width: min(520px, 92vw);
    }

    .submit-box {
      flex: 1;
      background: rgba(10,10,20,.85);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 16px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .submit-box:focus-within {
      border-color: rgba(245,158,11,.4);
      box-shadow: 0 0 0 3px rgba(245,158,11,.08);
    }

    .submit-box textarea {
      width: 100%; resize: none;
      background: none; border: none; outline: none;
      font-family: 'Manrope', sans-serif;
      font-size: .88rem; font-weight: 500;
      color: var(--text); line-height: 1.5;
      max-height: 120px;
    }
    .submit-box textarea::placeholder { color: var(--muted); }

    .submit-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .submit-name {
      font-size: .72rem; color: var(--muted);
      background: none; border: none; outline: none;
      font-family: 'Manrope', sans-serif; font-weight: 500;
      width: 130px; color: var(--sub);
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color .2s;
    }
    .submit-name:focus { border-color: var(--gold); }
    .submit-name::placeholder { color: var(--muted); }

    .char-count { font-size: .68rem; color: var(--muted); }

    .submit-btn {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--gold); color: #000; border: none;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
    }
    .submit-btn:hover { background: #fbbf24; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,.35); }
    .submit-btn:active { transform: scale(.95); }
    .submit-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }

    /* ── Empty state ───────────────────────── */
    .empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; pointer-events: none;
    }
    .empty i { font-size: 2.5rem; color: var(--muted); }
    .empty p  { font-size: .88rem; color: var(--muted); font-family: 'Manrope', sans-serif; }

    /* ── Toast ─────────────────────────────── */
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: .82rem; font-weight: 500; color: var(--text);
      font-family: 'Manrope', sans-serif;
      z-index: 20; opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Config banner ─────────────────────── */
    .config-banner {
      position: fixed; top: calc(var(--nav-h, 58px) + 12px); left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.35);
      color: #f87171; border-radius: 10px; padding: 10px 18px;
      font-size: .78rem; font-weight: 600; font-family: 'Manrope', sans-serif;
      z-index: 20; display: none; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="aurora" aria-hidden="true">

</div>

<!-- Nav -->
<nav class="nav">
  <a href="../" class="nav-brand">TUW</a>
  <div class="nav-divider"></div>
  <div class="nav-links">
    <a href="../">Home</a>
    <a href="../videos/">Videos</a>
    <a href="../games/">Games</a>
    <a href="./" class="active">Suggestions</a>
  </div>
  <div class="nav-socials">
    <a href="https://www.youtube.com/@ethan1957-p2y" class="nav-pill nav-pill-yt" target="_blank">
      <i class="fa-brands fa-youtube"></i> YouTube
    </a>
    <a href="https://discord.gg/vBMNDBTFn" class="nav-pill nav-pill-dc" target="_blank">
      <i class="fa-brands fa-discord"></i> Discord
    </a>
  </div>

<!-- Config warning -->
<div class="config-banner" id="configBanner">
  <i class="fa-solid fa-triangle-exclamation"></i>
  Firebase not configured — add your config in suggestions/index.html
</div>

<!-- Physics arena -->
<div class="arena" id="arena">
  <div class="empty" id="emptyState">
    <i class="fa-regular fa-comment-dots"></i>
    <p>No suggestions yet — be the first!</p>
  </div>
</div>

<!-- Submit -->
<div class="submit-wrap">
  <div class="submit-box">
    <textarea
      id="suggestionText"
      rows="2"
      placeholder="Got an idea or suggestion? Drop it here..."
      maxlength="200"
    ></textarea>
    <div class="submit-footer">
      <input class="submit-name" id="authorName" type="text" placeholder="Your name (optional)" maxlength="30">
      <span class="char-count" id="charCount">0 / 200</span>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" title="Send suggestion">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════
  Firebase SDK
  ═══════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }                       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  /* ─────────────────────────────────────────────────────────
     STEP 1: Paste your Firebase config here.
     Get it from: Firebase Console → Project Settings → Your apps → SDK setup
  ───────────────────────────────────────────────────────── */
  const FIREBASE_CONFIG = {
    apiKey:            'YOUR_API_KEY',
    authDomain:        'YOUR_PROJECT.firebaseapp.com',
    databaseURL:       'https://YOUR_PROJECT-default-rtdb.firebaseio.com',
    projectId:         'YOUR_PROJECT',
    storageBucket:     'YOUR_PROJECT.appspot.com',
    messagingSenderId: 'YOUR_SENDER_ID',
    appId:             'YOUR_APP_ID',
  };

  /* ─────────────────────────────────────────────────────────
     STEP 2: In Firebase Console → Realtime Database → Rules, set:
     {
       "rules": {
         "suggestions": {
           ".read": true,
           ".write": true
         }
       }
     }
  ───────────────────────────────────────────────────────── */

  const COLOURS = ['c-gold', 'c-purple', 'c-green', 'c-blue', 'c-pink'];

  /* ── Init ─────────────────────────────────────────────── */
  const configured = FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';

  if (!configured) {
    document.getElementById('configBanner').style.display = 'flex';
  }

  const app = configured ? initializeApp(FIREBASE_CONFIG) : null;
  const db  = configured ? getDatabase(app) : null;

  /* ── Physics state ────────────────────────────────────── */
  const arena    = document.getElementById('arena');
  const empty    = document.getElementById('emptyState');
  const bubbles  = []; // { el, x, y, vx, vy, w, h }

  const DAMPING  = 0.985;
  const MIN_SPD  = 0.4;
  const MAX_SPD  = 2.2;

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function clampSpeed(b) {
    const spd = Math.hypot(b.vx, b.vy);
    if (spd < MIN_SPD && spd > 0) {
      const s = MIN_SPD / spd;
      b.vx *= s; b.vy *= s;
    }
    if (spd > MAX_SPD) {
      const s = MAX_SPD / spd;
      b.vx *= s; b.vy *= s;
    }
  }

  /* ── Create bubble DOM ────────────────────────────────── */
  function spawnBubble(data) {
    empty.style.display = 'none';

    const aw = arena.clientWidth;
    const ah = arena.clientHeight;

    const el = document.createElement('div');
    el.className = 'bubble entering ' + COLOURS[Math.floor(Math.random() * COLOURS.length)];

    el.innerHTML = `
      <div class="bubble-text">${escHtml(data.text)}</div>
      <div class="bubble-meta">${data.author ? escHtml(data.author) : 'Anonymous'}</div>
    `;
    el.style.zIndex = bubbles.length + 1;
    arena.appendChild(el);

    // Measure after append
    const w = el.offsetWidth;
    const h = el.offsetHeight;

    const x = randBetween(w / 2 + 10, aw - w / 2 - 10);
    const y = randBetween(h / 2 + 10, ah - h / 2 - 10);
    const angle = Math.random() * Math.PI * 2;
    const spd   = randBetween(MIN_SPD, MAX_SPD * 0.7);

    const b = {
      el, x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      w, h,
      dragging: false,
    };

    el.style.left = x + 'px';
    el.style.top  = y + 'px';

    // Remove entering class after animation
    setTimeout(() => el.classList.remove('entering'), 500);

    // Drag
    attachDrag(b);
    bubbles.push(b);
  }

  /* ── Physics loop ─────────────────────────────────────── */
  function tick() {
    const aw = arena.clientWidth;
    const ah = arena.clientHeight;

    for (const b of bubbles) {
      if (b.dragging) continue;

      b.x += b.vx;
      b.y += b.vy;

      // Wall bounce
      const hw = b.w / 2, hh = b.h / 2;
      if (b.x - hw < 0)    { b.x = hw;      b.vx =  Math.abs(b.vx); }
      if (b.x + hw > aw)   { b.x = aw - hw; b.vx = -Math.abs(b.vx); }
      if (b.y - hh < 0)    { b.y = hh;      b.vy =  Math.abs(b.vy); }
      if (b.y + hh > ah)   { b.y = ah - hh; b.vy = -Math.abs(b.vy); }

      b.vx *= DAMPING;
      b.vy *= DAMPING;
      clampSpeed(b);

      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y  + 'px';
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  /* ── Drag ─────────────────────────────────────────────── */
  function attachDrag(b) {
    let ox = 0, oy = 0;
    let lastX = 0, lastY = 0, lastT = 0;
    let velX = 0, velY = 0;

    function onMove(e) {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const ar = arena.getBoundingClientRect();

      const now = performance.now();
      const dt  = now - lastT || 1;
      velX = (cx - lastX) / dt * 16;
      velY = (cy - lastY) / dt * 16;
      lastX = cx; lastY = cy; lastT = now;

      b.x = cx - ar.left - ox;
      b.y = cy - ar.top  - oy;
      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
    }

    function onUp() {
      b.dragging = false;
      b.el.classList.remove('grabbed');
      b.vx = velX;
      b.vy = velY;
      clampSpeed(b);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend',  onUp);
    }

    function onDown(e) {
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const ar = arena.getBoundingClientRect();

      ox = cx - ar.left - b.x;
      oy = cy - ar.top  - b.y;
      lastX = cx; lastY = cy; lastT = performance.now();
      velX = velY = 0;

      b.dragging = true;
      b.el.classList.add('grabbed');
      b.el.style.zIndex = 50;

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend',  onUp);
    }

    b.el.addEventListener('mousedown',  onDown);
    b.el.addEventListener('touchstart', onDown, { passive: false });
  }

  /* ── Submit ───────────────────────────────────────────── */
  const textarea  = document.getElementById('suggestionText');
  const nameInput = document.getElementById('authorName');
  const submitBtn = document.getElementById('submitBtn');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length + ' / 200';
    submitBtn.disabled = textarea.value.trim().length === 0;
  });

  submitBtn.disabled = true;

  submitBtn.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) return;

    if (!configured) {
      showToast('Firebase not configured yet!');
      return;
    }

    submitBtn.disabled = true;

    try {
      await push(ref(db, 'suggestions'), {
        text,
        author: nameInput.value.trim() || null,
        ts:     Date.now(),
      });
      textarea.value  = '';
      nameInput.value = '';
      charCount.textContent = '0 / 200';
      showToast('Suggestion sent! 🎉');
    } catch (e) {
      console.error(e);
      showToast('Failed to send — check your Firebase rules.');
      submitBtn.disabled = false;
    }
  });

  // Submit on Ctrl/Cmd+Enter
  textarea.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click();
  });

  /* ── Listen for new suggestions ───────────────────────── */
  if (configured) {
    onChildAdded(ref(db, 'suggestions'), snap => {
      const data = snap.val();
      if (data?.text) spawnBubble(data);
    });
  } else {
    // Demo bubbles so the page isn't empty
    const demos = [
      { text: 'Add more LEGO animations!',    author: 'Fan123'    },
      { text: 'More Brawl Stars content 🎮',  author: 'GamerGuy'  },
      { text: 'Can you do a speedrun video?', author: null        },
      { text: 'Love the site!',               author: 'Visitor'   },
    ];
    setTimeout(() => demos.forEach((d, i) =>
      setTimeout(() => spawnBubble(d), i * 300)
    ), 400);
  }

  /* ── Helpers ──────────────────────────────────────────── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Re-measure bubbles on resize
  window.addEventListener('resize', () => {
    bubbles.forEach(b => { b.w = b.el.offsetWidth; b.h = b.el.offsetHeight; });
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions — TheUnlockedWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">

  <style>
    body { overflow: hidden; }

    .arena {
      position: fixed;
      top: var(--nav-h, 58px); left: 0; right: 0; bottom: 0;
      z-index: 2; overflow: hidden;
    }

    /* ── Bubble ── */
    .bubble {
      position: absolute;
      max-width: 220px; min-width: 110px;
      padding: 13px 16px 10px;
      border-radius: 14px; border: 1px solid;
      font-family: 'Manrope', sans-serif;
      font-size: .82rem; font-weight: 500; line-height: 1.5;
      cursor: grab; user-select: none;
      transform: translate(-50%, -50%);
      transition: box-shadow .2s;
      will-change: left, top;
      word-break: break-word;
    }
    .bubble:active { cursor: grabbing; }
    .bubble.grabbed { box-shadow: 0 16px 40px rgba(0,0,0,.55); z-index: 50 !important; }

    .bubble-text { color: var(--text); margin-bottom: 5px; }
    .bubble-meta { font-size: .67rem; font-weight: 600; letter-spacing: .5px; opacity: .5; }

    .bubble.c-gold   { background:rgba(245,158,11,.1);  border-color:rgba(245,158,11,.3);  color:var(--gold);   }
    .bubble.c-purple { background:rgba(88,101,242,.1);  border-color:rgba(88,101,242,.3);  color:var(--purple); }
    .bubble.c-green  { background:rgba(52,211,153,.1);  border-color:rgba(52,211,153,.3);  color:var(--green);  }
    .bubble.c-blue   { background:rgba(56,189,248,.1);  border-color:rgba(56,189,248,.3);  color:#38bdf8;       }
    .bubble.c-pink   { background:rgba(244,114,182,.1); border-color:rgba(244,114,182,.3); color:#f472b6;       }

    /* Admin controls on bubble */
    .bubble-admin {
      display: none;
      gap: 6px; margin-top: 8px;
      border-top: 1px solid currentColor;
      padding-top: 7px; opacity: .6;
    }
    .bubble-admin.visible { display: flex; }
    .bubble-admin button {
      background: none; border: none; cursor: pointer;
      font-size: .7rem; font-weight: 700; color: inherit;
      display: flex; align-items: center; gap: 4px;
      transition: opacity .15s;
    }
    .bubble-admin button:hover { opacity: 1; }

    @keyframes popIn {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(.3); }
      70%  { transform:translate(-50%,-50%) scale(1.06); }
      100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }
    .bubble.entering { animation: popIn .4s cubic-bezier(.22,1,.36,1) forwards; }

    /* ── Submit form ── */
    .submit-wrap {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; display: flex; gap: 10px; align-items: flex-end;
      width: min(520px, 92vw);
    }
    .submit-box {
      flex: 1;
      background: rgba(8,8,18,.88);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 13px 16px;
      transition: border-color .2s, box-shadow .2s;
    }
    .submit-box:focus-within {
      border-color: rgba(245,158,11,.4);
      box-shadow: 0 0 0 3px rgba(245,158,11,.07);
    }
    .submit-box textarea {
      width: 100%; resize: none;
      background: none; border: none; outline: none;
      font-family: 'Manrope', sans-serif; font-size: .88rem;
      font-weight: 500; color: var(--text); line-height: 1.5;
      max-height: 110px;
    }
    .submit-box textarea::placeholder { color: var(--muted); }
    .submit-footer {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 8px;
    }
    .submit-name {
      background: none; border: none; outline: none;
      border-bottom: 1px solid var(--border);
      font-family: 'Manrope', sans-serif; font-size: .72rem;
      font-weight: 500; color: var(--sub); width: 130px; padding-bottom: 2px;
      transition: border-color .2s;
    }
    .submit-name:focus { border-color: var(--gold); }
    .submit-name::placeholder { color: var(--muted); }
    .char-count { font-size: .68rem; color: var(--muted); }

    .submit-btn {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--gold); color: #000; border: none;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
    }
    .submit-btn:hover:not(:disabled) { background:#fbbf24; transform:translateY(-2px); box-shadow:0 8px 24px rgba(245,158,11,.35); }
    .submit-btn:disabled { opacity:.35; cursor:default; }
    .submit-btn .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; pointer-events: none;
    }
    .empty i { font-size: 2.4rem; color: var(--muted); }
    .empty p  { font-size: .88rem; color: var(--muted); font-family: 'Manrope', sans-serif; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 96px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 18px;
      font-size: .82rem; font-weight: 500; color: var(--text);
      font-family: 'Manrope', sans-serif; z-index: 30;
      opacity: 0; transition: opacity .22s, transform .22s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(239,68,68,.35); color: #f87171; }

    /* ── Admin button ── */
    .admin-fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: .85rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: color .15s, border-color .15s;
    }
    .admin-fab:hover { color: var(--text); border-color: var(--border-h); }
    .admin-fab.active { color: var(--gold); border-color: rgba(245,158,11,.4); background: var(--gold-gl); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.78); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 90%; max-width: 380px;
      position: relative;
    }
    .modal h3 {
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 18px;
    }
    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
      transition: color .15s, transform .15s;
    }
    .modal-close:hover { color: #ef4444; transform: rotate(90deg); }

    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: .72rem; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .modal-field input {
      width: 100%; background: var(--surface, #0d0d1b); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 9px 12px;
      font-family: 'Manrope', sans-serif; font-size: .88rem;
      transition: border-color .15s; outline: none;
    }
    .modal-field input:focus { border-color: var(--gold); }

    .modal-btn {
      width: 100%; padding: 11px;
      background: var(--gold); color: #000; border: none;
      border-radius: 10px; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .95rem; cursor: pointer;
      transition: background .15s, transform .15s;
      margin-top: 4px;
    }
    .modal-btn:hover { background: #fbbf24; transform: translateY(-1px); }

    .modal-err { font-size: .78rem; color: #f87171; margin-top: 8px; display: none; }

    /* Edit modal textarea */
    .modal-field textarea {
      width: 100%; background: var(--surface, #0d0d1b); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 9px 12px;
      font-family: 'Manrope', sans-serif; font-size: .88rem;
      transition: border-color .15s; outline: none; resize: vertical;
      min-height: 80px;
    }
    .modal-field textarea:focus { border-color: var(--gold); }

    /* Moderation badge */
    .mod-checking {
      position: absolute; inset: 0; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(6,6,13,.7); backdrop-filter: blur(2px);
      font-size: .7rem; color: var(--muted); gap: 6px;
      font-family: 'Manrope', sans-serif;
    }
  </style>
</head>

<!-- ═══ Injected secrets ═══════════════════════════════════
  These placeholders are replaced by the GitHub Actions
  workflow at deploy time. Never hardcode real values here.
═════════════════════════════════════════════════════════ -->
<script>
  window.__FIREBASE_CONFIG__  = '%%FIREBASE_CONFIG%%';
  window.__PERSPECTIVE_KEY__  = '%%PERSPECTIVE_KEY%%';
  window.__ADMIN_USER_HASH__  = '%%ADMIN_USER_HASH%%';
  window.__ADMIN_PASS_HASH__  = '%%ADMIN_PASS_HASH%%';
</script>

<!-- ═══ Firebase SDK ═══════════════════════════════════════ -->
<script type="module">
  import { initializeApp }                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, onChildAdded,
           update, remove, get }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  /* ── Parse injected config ─────────────────────────── */
  let firebaseConfig;
  try {
    firebaseConfig = JSON.parse(window.__FIREBASE_CONFIG__);
  } catch {
    firebaseConfig = null;
  }

  const PERSPECTIVE_KEY = window.__PERSPECTIVE_KEY__;
  const ADMIN_USER_HASH = window.__ADMIN_USER_HASH__;
  const ADMIN_PASS_HASH = window.__ADMIN_PASS_HASH__;

  const configured = firebaseConfig && firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('%%');

  const app = configured ? initializeApp(firebaseConfig) : null;
  const db  = configured ? getDatabase(app) : null;

  /* ── SHA-256 helper ────────────────────────────────── */
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
  }

  /* ── Perspective API moderation ────────────────────── */
  async function moderate(text) {
    if (!PERSPECTIVE_KEY || PERSPECTIVE_KEY.startsWith('%%')) return { ok: true };
    try {
      const res = await fetch(
        `https://commentanalyzer.googleapis.com/v1alpha1/comments:analyze?key=${PERSPECTIVE_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            comment: { text },
            requestedAttributes: {
              TOXICITY: {}, SPAM: {}, INSULT: {}
            },
            languages: ['en'],
          }),
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Moderation error');

      const toxicity = data.attributeScores?.TOXICITY?.summaryScore?.value || 0;
      const spam     = data.attributeScores?.SPAM?.summaryScore?.value     || 0;
      const insult   = data.attributeScores?.INSULT?.summaryScore?.value   || 0;

      console.log('[Mod] toxicity:', toxicity, 'spam:', spam, 'insult:', insult);

      if (toxicity > 0.85) return { ok: false, reason: "That seems a bit toxic. Please keep it friendly 😊" };
      if (spam     > 0.85) return { ok: false, reason: "That looks like spam. Try a real suggestion!" };
      if (insult   > 0.85) return { ok: false, reason: "Let's keep it respectful 👍" };

      return { ok: true };
    } catch (e) {
      console.warn('[Mod] Perspective API error:', e.message, '— allowing through');
      return { ok: true }; // fail open so a broken API key doesn't block all submissions
    }
  }

  /* ── Physics ───────────────────────────────────────── */
  const COLOURS  = ['c-gold','c-purple','c-green','c-blue','c-pink'];
  const DAMPING  = 0.985;
  const MIN_SPD  = 0.4;
  const MAX_SPD  = 2.2;
  const arena    = document.getElementById('arena');
  const empty    = document.getElementById('emptyState');
  const bubbles  = [];
  let   adminMode = false;

  function clampSpeed(b) {
    const s = Math.hypot(b.vx, b.vy);
    if (s > 0 && s < MIN_SPD) { b.vx *= MIN_SPD/s; b.vy *= MIN_SPD/s; }
    if (s > MAX_SPD)           { b.vx *= MAX_SPD/s; b.vy *= MAX_SPD/s; }
  }

  function spawnBubble(id, data) {
    empty.style.display = 'none';
    const aw = arena.clientWidth, ah = arena.clientHeight;
    const el = document.createElement('div');
    el.className = 'bubble entering ' + COLOURS[Math.floor(Math.random()*COLOURS.length)];
    el.dataset.id = id;
    el.innerHTML = `
      <div class="bubble-text">${esc(data.text)}</div>
      <div class="bubble-meta">${data.author ? esc(data.author) : 'Anonymous'}</div>
      <div class="bubble-admin${adminMode ? ' visible' : ''}">
        <button class="edit-btn"><i class="fa-solid fa-pen"></i> Edit</button>
        <button class="del-btn" style="color:#f87171"><i class="fa-solid fa-trash"></i> Delete</button>
      </div>`;
    el.style.zIndex = bubbles.length + 1;
    arena.appendChild(el);

    const w = el.offsetWidth, h = el.offsetHeight;
    const x = Math.random()*(aw-w-20)+w/2+10;
    const y = Math.random()*(ah-h-20)+h/2+10;
    const a = Math.random()*Math.PI*2, spd = (MIN_SPD + Math.random()*(MAX_SPD*0.7-MIN_SPD));
    const b = { el, id, x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w, h, dragging: false };

    el.style.left = b.x+'px'; el.style.top = b.y+'px';
    setTimeout(() => el.classList.remove('entering'), 500);

    // Admin controls
    el.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); deleteSuggestion(b); });
    el.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); openEdit(b, data); });

    attachDrag(b);
    bubbles.push(b);
  }

  function tick() {
    const aw = arena.clientWidth, ah = arena.clientHeight;
    for (const b of bubbles) {
      if (b.dragging) continue;
      b.x += b.vx; b.y += b.vy;
      const hw = b.w/2, hh = b.h/2;
      if (b.x-hw < 0)    { b.x=hw;      b.vx= Math.abs(b.vx); }
      if (b.x+hw > aw)   { b.x=aw-hw;   b.vx=-Math.abs(b.vx); }
      if (b.y-hh < 0)    { b.y=hh;      b.vy= Math.abs(b.vy); }
      if (b.y+hh > ah)   { b.y=ah-hh;   b.vy=-Math.abs(b.vy); }
      b.vx *= DAMPING; b.vy *= DAMPING;
      clampSpeed(b);
      b.el.style.left = b.x+'px'; b.el.style.top = b.y+'px';
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* ── Drag ──────────────────────────────────────────── */
  function attachDrag(b) {
    let ox=0, oy=0, lx=0, ly=0, lt=0, vx=0, vy=0;
    const onMove = e => {
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const ar=arena.getBoundingClientRect();
      const now=performance.now(), dt=now-lt||1;
      vx=(cx-lx)/dt*16; vy=(cy-ly)/dt*16;
      lx=cx; ly=cy; lt=now;
      b.x=cx-ar.left-ox; b.y=cy-ar.top-oy;
      b.el.style.left=b.x+'px'; b.el.style.top=b.y+'px';
    };
    const onUp = () => {
      b.dragging=false; b.el.classList.remove('grabbed');
      b.vx=vx; b.vy=vy; clampSpeed(b);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('touchend',onUp);
    };
    const onDown = e => {
      if (e.target.closest('.bubble-admin')) return;
      e.preventDefault();
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const ar=arena.getBoundingClientRect();
      ox=cx-ar.left-b.x; oy=cy-ar.top-b.y;
      lx=cx; ly=cy; lt=performance.now(); vx=vy=0;
      b.dragging=true; b.el.classList.add('grabbed'); b.el.style.zIndex=50;
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      document.addEventListener('touchmove',onMove,{passive:false});
      document.addEventListener('touchend',onUp);
    };
    b.el.addEventListener('mousedown',onDown);
    b.el.addEventListener('touchstart',onDown,{passive:false});
  }

  /* ── Admin mode ────────────────────────────────────── */
  function setAdminMode(val) {
    adminMode = val;
    document.getElementById('adminFab').classList.toggle('active', val);
    document.getElementById('adminFab').title = val ? 'Admin active' : 'Admin';
    document.querySelectorAll('.bubble-admin').forEach(el => {
      el.classList.toggle('visible', val);
    });
    if (val) showToast('Admin mode on — you can now edit or delete bubbles');
    else     showToast('Admin mode off');
  }

  /* ── Admin login ───────────────────────────────────── */
  const loginModal  = document.getElementById('loginModal');
  const loginErr    = document.getElementById('loginErr');
  const adminFab    = document.getElementById('adminFab');

  adminFab.addEventListener('click', () => {
    if (adminMode) { setAdminMode(false); return; }
    loginErr.style.display = 'none';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    loginModal.classList.add('open');
    setTimeout(() => document.getElementById('loginUser').focus(), 100);
  });

  document.getElementById('loginClose').addEventListener('click', () => loginModal.classList.remove('open'));

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const [uh, ph] = await Promise.all([sha256(user), sha256(pass)]);
    if (uh === ADMIN_USER_HASH && ph === ADMIN_PASS_HASH) {
      loginModal.classList.remove('open');
      setAdminMode(true);
    } else {
      loginErr.style.display = 'block';
    }
  });

  // Enter key in login fields
  ['loginUser','loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  });

  /* ── Edit suggestion ───────────────────────────────── */
  const editModal = document.getElementById('editModal');
  let   editTarget = null;

  document.getElementById('editClose').addEventListener('click', () => editModal.classList.remove('open'));

  function openEdit(b, data) {
    editTarget = b;
    document.getElementById('editText').value   = data.text   || '';
    document.getElementById('editAuthor').value  = data.author || '';
    editModal.classList.add('open');
    setTimeout(() => document.getElementById('editText').focus(), 100);
  }

  document.getElementById('editSave').addEventListener('click', async () => {
    if (!editTarget || !db) return;
    const text   = document.getElementById('editText').value.trim();
    const author = document.getElementById('editAuthor').value.trim();
    if (!text) return;
    try {
      await update(ref(db, 'suggestions/' + editTarget.id), { text, author: author || null });
      // Update bubble DOM
      editTarget.el.querySelector('.bubble-text').textContent = text;
      editTarget.el.querySelector('.bubble-meta').textContent = author || 'Anonymous';
      editModal.classList.remove('open');
      showToast('Suggestion updated ✓');
    } catch (e) {
      showToast('Update failed: ' + e.message, true);
    }
  });

  /* ── Delete suggestion ─────────────────────────────── */
  async function deleteSuggestion(b) {
    if (!db) return;
    try {
      await remove(ref(db, 'suggestions/' + b.id));
      b.el.style.transition = 'opacity .3s, transform .3s';
      b.el.style.opacity = '0';
      b.el.style.transform = 'translate(-50%,-50%) scale(.5)';
      setTimeout(() => {
        b.el.remove();
        const idx = bubbles.indexOf(b);
        if (idx > -1) bubbles.splice(idx, 1);
        if (!bubbles.length) empty.style.display = 'flex';
      }, 320);
      showToast('Suggestion deleted');
    } catch (e) {
      showToast('Delete failed: ' + e.message, true);
    }
  }

  /* ── Submit ────────────────────────────────────────── */
  const textarea  = document.getElementById('suggestionText');
  const nameInput = document.getElementById('authorName');
  const submitBtn = document.getElementById('submitBtn');
  const submitIcon= document.getElementById('submitIcon');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length + ' / 200';
    submitBtn.disabled = !textarea.value.trim();
  });

  submitBtn.addEventListener('click', async () => {
    const text   = textarea.value.trim();
    const author = nameInput.value.trim();
    if (!text) return;

    // Start loading spinner
    submitBtn.disabled = true;
    submitIcon.className = 'fa-solid fa-circle-notch spin';

    // Moderate
    const modResult = await moderate(text);
    if (!modResult.ok) {
      showToast(modResult.reason, true);
      submitBtn.disabled = false;
      submitIcon.className = 'fa-solid fa-paper-plane';
      return;
    }

    if (!configured) {
      // Demo: spawn locally
      spawnBubble('demo-' + Date.now(), { text, author: author || null });
      textarea.value = ''; nameInput.value = ''; charCount.textContent = '0 / 200';
      showToast('Suggestion added! (demo mode)');
      submitIcon.className = 'fa-solid fa-paper-plane';
      return;
    }

    try {
      await push(ref(db, 'suggestions'), {
        text, author: author || null, ts: Date.now()
      });
      textarea.value = ''; nameInput.value = ''; charCount.textContent = '0 / 200';
      showToast('Suggestion sent! 🎉');
    } catch (e) {
      showToast('Failed to send — check Firebase rules.', true);
      submitBtn.disabled = false;
    }
    submitIcon.className = 'fa-solid fa-paper-plane';
  });

  textarea.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='Enter') submitBtn.click();
  });

  /* ── Load from Firebase ────────────────────────────── */
  if (configured) {
    onChildAdded(ref(db, 'suggestions'), snap => {
      const data = snap.val();
      if (data?.text) spawnBubble(snap.key, data);
    });
  } else {
    // Demo bubbles
    const demos = [
      { text: 'Add more LEGO animations!',     author: 'Fan123'   },
      { text: 'More Brawl Stars content 🎮',   author: 'GamerGuy' },
      { text: 'Can you do a speedrun video?',  author: null       },
      { text: 'Love the site design!',         author: 'Visitor'  },
    ];
    setTimeout(() => demos.forEach((d,i) => setTimeout(() => spawnBubble('demo-'+i, d), i*250)), 300);
  }

  /* ── Helpers ───────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (isError ? ' error' : '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  window.addEventListener('resize', () => {
    bubbles.forEach(b => { b.w=b.el.offsetWidth; b.h=b.el.offsetHeight; });
  });

  // Close modals on background click
  [loginModal, editModal].forEach(m => {
    m.addEventListener('click', e => { if (e.target===m) m.classList.remove('open'); });
  });
</script>
</body>
</html>

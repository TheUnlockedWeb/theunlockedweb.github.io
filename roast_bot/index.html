<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roast Bot — TheUnlockedWeb</title>
  <meta name="description" content="Get absolutely destroyed by TUW's AI roast bot. If you can't handle the heat, stay out of the chat.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="icon" type="image/x-icon" href="../assets/resources/favicon.ico">

  <style>
    /* ── Layout ──────────────────────────────── */
    body { overflow: hidden; }

    .roast-shell {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2;
      display: flex; flex-direction: column;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Flame header ────────────────────────── */
    .roast-header {
      flex-shrink: 0;
      padding: 0 24px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,6,13,.85);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; gap: 14px;
    }

    .roast-header-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; color: #f87171;
      animation: flamePulse 2s ease-in-out infinite;
    }
    @keyframes flamePulse {
      0%,100% { box-shadow: 0 0 8px rgba(239,68,68,.3); }
      50%      { box-shadow: 0 0 20px rgba(239,68,68,.55), 0 0 40px rgba(245,158,11,.2); }
    }

    .roast-header-info { flex: 1; }
    .roast-header-name {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: .95rem; color: var(--text);
    }
    .roast-header-sub {
      font-size: .68rem; color: var(--muted); margin-top: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f87171; box-shadow: 0 0 6px #f87171;
      animation: pulse 2s infinite;
    }
    .status-dot.thinking {
      background: var(--gold); box-shadow: 0 0 6px var(--gold);
    }

    .heat-meter {
      display: flex; align-items: center; gap: 8px;
      font-size: .7rem; font-weight: 700; color: var(--muted);
      font-family: 'Manrope', sans-serif;
    }
    .heat-flames {
      display: flex; gap: 2px;
    }
    .heat-flame {
      font-size: .8rem;
      transition: color .3s, transform .3s;
      color: var(--muted);
    }
    .heat-flame.lit { color: #f97316; transform: scale(1.15); }
    .heat-label { color: var(--muted); font-size: .68rem; letter-spacing: 1px; text-transform: uppercase; }

    .clear-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .73rem; font-weight: 600;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: none;
      color: var(--muted); cursor: pointer; font-family: 'Manrope', sans-serif;
      transition: color .15s, border-color .15s, background .15s;
    }
    .clear-btn:hover { color: #f87171; border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.07); }

    /* ── Messages ─────────────────────────────── */
    .messages-wrap {
      flex: 1; overflow-y: auto; padding: 20px 24px 8px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome card */
    .welcome-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 10px; max-width: 500px;
      margin: auto;
      animation: fadeUp .6s .1s cubic-bezier(.22,1,.36,1) both;
    }
    .welcome-fire {
      font-size: 3rem; line-height: 1;
      animation: fireWobble 1.6s ease-in-out infinite;
    }
    @keyframes fireWobble {
      0%,100% { transform: rotate(-5deg) scale(1); }
      50%      { transform: rotate(5deg)  scale(1.1); }
    }
    .welcome-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.35rem; color: var(--text);
    }
    .welcome-sub {
      font-size: .83rem; color: var(--muted); line-height: 1.65;
      max-width: 340px;
    }
    .welcome-chips {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-top: 6px;
    }
    .welcome-chip {
      font-size: .7rem; font-weight: 600; padding: 5px 12px;
      border-radius: 99px; border: 1px solid; cursor: pointer;
      font-family: 'Manrope', sans-serif;
      transition: background .15s, transform .15s;
    }
    .welcome-chip:hover { transform: translateY(-2px); }
    .wc-red    { color:#f87171; border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.08); }
    .wc-red:hover    { background:rgba(248,113,113,.18); }
    .wc-orange { color:#fb923c; border-color:rgba(251,146,60,.3);  background:rgba(251,146,60,.08); }
    .wc-orange:hover { background:rgba(251,146,60,.18); }
    .wc-gold   { color:var(--gold); border-color:rgba(245,158,11,.3); background:var(--gold-gl); }
    .wc-gold:hover   { background:rgba(245,158,11,.18); }

    /* Message bubbles */
    .msg-row {
      display: flex; gap: 12px; align-items: flex-end;
      animation: msgSlide .32s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 800; font-family: 'Syne', sans-serif;
      border: 1px solid;
    }
    .av-bot  { background:rgba(239,68,68,.15); color:#f87171; border-color:rgba(239,68,68,.3); }
    .av-user { background:var(--gold-gl); color:var(--gold); border-color:rgba(245,158,11,.3); }

    .msg-bubble {
      max-width: 72%; padding: 12px 16px; border-radius: 16px;
      font-family: 'Manrope', sans-serif; font-size: .87rem;
      line-height: 1.6; border: 1px solid;
      position: relative;
    }
    .msg-row.bot  .msg-bubble {
      background: var(--card); border-color: var(--border);
      color: var(--text); border-bottom-left-radius: 4px;
    }
    .msg-row.user .msg-bubble {
      background: rgba(245,158,11,.1); border-color: rgba(245,158,11,.25);
      color: var(--text); border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: .62rem; color: var(--muted); margin-top: 4px;
      text-align: right;
    }
    .msg-row.bot .msg-time { text-align: left; }

    /* Typing indicator bubble */
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f87171; opacity: .5;
      animation: typingBounce .9s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-6px); opacity: 1; }
    }

    /* Roast intensity badge on bot messages */
    .roast-badge {
      position: absolute; top: -8px; right: 10px;
      font-size: .62rem; font-weight: 700; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 99px;
      border: 1px solid; font-family: 'Manrope', sans-serif;
    }
    .rb-mild   { color: var(--gold);  border-color: rgba(245,158,11,.35); background: var(--gold-gl); }
    .rb-medium { color: #fb923c;      border-color: rgba(251,146,60,.35); background: rgba(251,146,60,.1); }
    .rb-savage { color: #f87171;      border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.1); }
    .rb-nuke   { color: #e11d48;      border-color: rgba(225,29,72,.4); background: rgba(225,29,72,.12); animation: nukeGlow 1.5s infinite; }
    @keyframes nukeGlow {
      0%,100% { box-shadow: 0 0 0 rgba(225,29,72,0); }
      50%      { box-shadow: 0 0 10px rgba(225,29,72,.4); }
    }

    /* ── Input bar ────────────────────────────── */
    .input-bar {
      padding: 12px 24px 16px;
      background: rgba(6,6,13,.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within {
      border-color: rgba(248,113,113,.4);
      box-shadow: 0 0 0 3px rgba(248,113,113,.07);
    }
    .chat-input {
      flex: 1; background: none; border: none; outline: none;
      resize: none; font-family: 'Manrope', sans-serif;
      font-size: .88rem; font-weight: 500; color: var(--text);
      line-height: 1.5; max-height: 120px;
    }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      transition: transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s, opacity .15s;
      box-shadow: 0 4px 14px rgba(239,68,68,.3);
    }
    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 22px rgba(239,68,68,.45);
    }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }

    .input-footer {
      display: flex; align-items: center; margin-top: 7px;
      padding: 0 2px; gap: 6px;
    }
    .intensity-label { font-size: .65rem; color: var(--muted); font-family: 'Manrope', sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .intensity-btns  { display: flex; gap: 4px; }
    .int-btn {
      font-size: .65rem; font-weight: 700; letter-spacing: .5px;
      padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border);
      background: none; color: var(--muted); cursor: pointer;
      font-family: 'Manrope', sans-serif;
      transition: background .14s, color .14s, border-color .14s, transform .14s;
    }
    .int-btn:hover { transform: scale(1.05); }
    .int-btn.active-mild   { color:var(--gold);  border-color:rgba(245,158,11,.4); background:var(--gold-gl); }
    .int-btn.active-medium { color:#fb923c;      border-color:rgba(251,146,60,.4); background:rgba(251,146,60,.1); }
    .int-btn.active-savage { color:#f87171;      border-color:rgba(248,113,113,.4); background:rgba(248,113,113,.1); }
    .int-btn.active-nuke   { color:#e11d48;      border-color:rgba(225,29,72,.5); background:rgba(225,29,72,.12); }
    .char-count { margin-left: auto; font-size: .68rem; color: var(--muted); }

    /* ── Toast ─────────────────────────────────── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; z-index: 300;
      transform: translateX(-50%) translateY(10px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: .82rem; font-weight: 500; color: var(--text);
      font-family: 'Manrope', sans-serif;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 600px) {
      .roast-header { padding: 0 14px; gap: 10px; }
      .heat-meter   { display: none; }
      .messages-wrap { padding: 14px 14px 6px; }
      .input-bar    { padding: 10px 14px 14px; }
      .msg-bubble   { max-width: 84%; font-size: .84rem; }
    }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="aurora" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Main shell -->
<div class="roast-shell">

  <!-- Header -->
  <div class="roast-header">
    <div class="roast-header-icon"><i class="fa-solid fa-fire"></i></div>
    <div class="roast-header-info">
      <div class="roast-header-name">RoastBot 🔥</div>
      <div class="roast-header-sub">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready to cook you alive</span>
      </div>
    </div>
    <div class="heat-meter">
      <span class="heat-label">Heat</span>
      <div class="heat-flames" id="heatFlames">
        <span class="heat-flame" data-n="1">🔥</span>
        <span class="heat-flame" data-n="2">🔥</span>
        <span class="heat-flame" data-n="3">🔥</span>
        <span class="heat-flame" data-n="4">🔥</span>
        <span class="heat-flame" data-n="5">🔥</span>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn">
      <i class="fa-solid fa-rotate-left"></i> Reset
    </button>
  </div>

  <!-- Messages -->
  <div class="messages-wrap" id="messagesWrap">
    <div class="welcome-card" id="welcomeCard">
      <div class="welcome-fire">🔥</div>
      <div class="welcome-title">Welcome to RoastBot</div>
      <div class="welcome-sub">
        Tell me about yourself and I'll roast you into oblivion.
        The more info you give, the more personal the pain.
        Don't say I didn't warn you.
      </div>
      <div class="welcome-chips">
        <button class="welcome-chip wc-red"    onclick="quickStart('Roast me. I dare you.')">🎯 Roast Me</button>
        <button class="welcome-chip wc-orange" onclick="quickStart('My name is [your name] and I love [something embarrassing].')">📝 Intro</button>
        <button class="welcome-chip wc-gold"   onclick="quickStart('Say something nice... then immediately roast me.')">😬 Nice then Nasty</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-row">
      <textarea
        class="chat-input" id="chatInput" rows="1"
        placeholder="Tell me something about yourself… 🔥"
        maxlength="400"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <i class="fa-solid fa-fire"></i>
      </button>
    </div>
    <div class="input-footer">
      <span class="intensity-label">Intensity</span>
      <div class="intensity-btns">
        <button class="int-btn" data-level="mild"   onclick="setIntensity('mild')">Mild</button>
        <button class="int-btn" data-level="medium" onclick="setIntensity('medium')">Medium</button>
        <button class="int-btn active-savage" data-level="savage" onclick="setIntensity('savage')">Savage</button>
        <button class="int-btn" data-level="nuke"   onclick="setIntensity('nuke')">☢️ Nuke</button>
      </div>
      <span class="char-count" id="charCount">0 / 400</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ──────────────────────────────────────────
   CONFIG
──────────────────────────────────────────── */
const GROQ_KEY = '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';
const MODEL    = 'llama-3.3-70b-versatile';

/* ──────────────────────────────────────────
   STATE
──────────────────────────────────────────── */
let intensity    = 'savage';   // mild | medium | savage | nuke
let conversationHistory = [];  // full context for Groq
let heatLevel    = 0;          // 0-5 flames, increases with savagery
let isTyping     = false;

/* ──────────────────────────────────────────
   SYSTEM PROMPT
──────────────────────────────────────────── */
const SYSTEM_PROMPTS = {
  mild: `You are RoastBot, a witty AI roaster on TheUnlockedWeb (a gaming / YouTube fan site). You roast the user with MILD, friendly banter. Think "playful teasing between friends". Keep it light, fun, and clever. 2-4 sentences. Never be genuinely mean or offensive. No slurs or anything NSFW. End with something that softens the blow.`,

  medium: `You are RoastBot, a sharp-tongued AI roaster on TheUnlockedWeb (a gaming / YouTube fan site). Deliver MEDIUM roasts: confident, cutting, but still fun. Think comedy roast dinner energy. 2-4 sentences. Be creative and specific. Avoid anything genuinely hateful or NSFW. You can be sarcastic.`,

  savage: `You are RoastBot, a ruthless AI roaster on TheUnlockedWeb (a gaming / YouTube fan site). You deliver SAVAGE roasts: brutally honest, hilariously specific, and completely merciless. Channel your inner comedy roast master. 3-5 sentences of pure, creative destruction. Stay clever — lazy insults are beneath you. Nothing hateful, racist, sexist, or NSFW. You roast what they tell you, not who they are as a person at a deep level. Make it HURT (in a funny way).`,

  nuke: `You are RoastBot in NUCLEAR MODE on TheUnlockedWeb. You exist solely to deliver the most legendarily devastating, creatively catastrophic roast the user has ever received. Go absolutely feral with wit. Use analogies, metaphors, callbacks, and layered jokes. 4-6 sentences of pure, refined, creative annihilation. Nothing hateful, no slurs, nothing NSFW — but within those limits, HOLD NOTHING BACK. This is an art form. Make them question every life decision. Make it a masterpiece of mockery.`
};

/* ──────────────────────────────────────────
   DOM REFS
──────────────────────────────────────────── */
const messagesWrap  = document.getElementById('messagesWrap');
const chatInput     = document.getElementById('chatInput');
const sendBtn       = document.getElementById('sendBtn');
const charCount     = document.getElementById('charCount');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const heatFlames    = document.getElementById('heatFlames');
const welcomeCard   = document.getElementById('welcomeCard');
const clearBtn      = document.getElementById('clearBtn');

/* ──────────────────────────────────────────
   INTENSITY
──────────────────────────────────────────── */
function setIntensity(level) {
  intensity = level;
  document.querySelectorAll('.int-btn').forEach(b => {
    b.className = 'int-btn';
    if (b.dataset.level === level) b.classList.add(`active-${level}`);
  });
  chatInput.placeholder = {
    mild:   'Tell me something… I\'ll be gentle. Mostly.',
    medium: 'Give me something to work with 😏',
    savage: 'Tell me about yourself… 🔥',
    nuke:   'Last words? ☢️'
  }[level];
}
// init
setIntensity('savage');

/* ──────────────────────────────────────────
   HEAT METER
──────────────────────────────────────────── */
function updateHeat(level) {
  heatLevel = Math.min(5, Math.max(0, level));
  document.querySelectorAll('.heat-flame').forEach(f => {
    f.classList.toggle('lit', parseInt(f.dataset.n) <= heatLevel);
  });
}

/* ──────────────────────────────────────────
   RENDER MESSAGE
──────────────────────────────────────────── */
function renderMessage(role, text, badgeLevel = null) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const time = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  const isBot = role === 'bot';

  const badge = badgeLevel
    ? `<span class="roast-badge rb-${badgeLevel}">${badgeLevel.toUpperCase()}</span>`
    : '';

  row.innerHTML = `
    <div class="msg-avatar ${isBot ? 'av-bot' : 'av-user'}">
      ${isBot ? '🔥' : 'U'}
    </div>
    <div>
      <div class="msg-bubble" style="position:relative">
        ${badge}
        ${escHtml(text)}
      </div>
      <div class="msg-time">${time}</div>
    </div>`;

  messagesWrap.appendChild(row);
  scrollToBottom();
  return row;
}

/* ──────────────────────────────────────────
   TYPING INDICATOR
──────────────────────────────────────────── */
function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg-avatar av-bot">🔥</div>
    <div>
      <div class="msg-bubble typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  messagesWrap.appendChild(row);
  scrollToBottom();
}
function hideTyping() {
  document.getElementById('typingRow')?.remove();
}

/* ──────────────────────────────────────────
   GROQ API
──────────────────────────────────────────── */
async function callGroq(userMessage) {
  // Add user message to history
  conversationHistory.push({ role: 'user', content: userMessage });

  const body = {
    model: MODEL,
    max_tokens: 250,
    temperature: intensity === 'nuke' ? 1.0 : intensity === 'savage' ? 0.95 : 0.85,
    messages: [
      { role: 'system', content: SYSTEM_PROMPTS[intensity] },
      ...conversationHistory
    ]
  };

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${GROQ_KEY}`,
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.text().catch(() => res.status);
    throw new Error('Groq error: ' + err);
  }

  const data    = await res.json();
  const reply   = data.choices?.[0]?.message?.content?.trim() || 'I\'m speechless. (That\'s how bad you are.)';

  // Add assistant reply to history for context retention
  conversationHistory.push({ role: 'assistant', content: reply });

  // Keep context window reasonable — last 20 exchanges
  if (conversationHistory.length > 40) {
    conversationHistory = conversationHistory.slice(-40);
  }

  return reply;
}

/* ──────────────────────────────────────────
   SEND MESSAGE
──────────────────────────────────────────── */
async function sendMessage(text) {
  text = text.trim();
  if (!text || isTyping) return;

  // Hide welcome card on first message
  if (welcomeCard) welcomeCard.style.display = 'none';

  isTyping = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  chatInput.style.height = '';
  charCount.textContent = '0 / 400';

  // User bubble
  renderMessage('user', text);

  // Status: thinking
  statusDot.classList.add('thinking');
  statusText.textContent = 'Loading the flamethrower…';

  showTyping();

  try {
    const roast = await callGroq(text);
    hideTyping();
    renderMessage('bot', roast, intensity);

    // Update heat meter — nuke = 5, savage = 4, medium = 2-3, mild = 1-2
    const heatMap = { mild: 1, medium: 3, savage: 4, nuke: 5 };
    updateHeat(heatMap[intensity] + (Math.random() > .5 ? 1 : 0));

    statusDot.classList.remove('thinking');
    statusText.textContent = 'Reloading ammo…';
    setTimeout(() => { statusText.textContent = 'Ready to cook you alive'; }, 2000);

  } catch(e) {
    hideTyping();
    statusDot.classList.remove('thinking');
    statusText.textContent = 'Ready to cook you alive';
    showToast('❌ Failed to fetch roast. Try again.');
    console.error(e);
  }

  isTyping = false;
  sendBtn.disabled = chatInput.value.trim().length === 0;
}

/* ──────────────────────────────────────────
   QUICK START
──────────────────────────────────────────── */
function quickStart(text) {
  chatInput.value = text;
  charCount.textContent = text.length + ' / 400';
  sendBtn.disabled = false;
  chatInput.focus();
  sendMessage(text);
}

/* ──────────────────────────────────────────
   CLEAR / RESET
──────────────────────────────────────────── */
clearBtn.addEventListener('click', () => {
  conversationHistory = [];
  heatLevel = 0;
  updateHeat(0);
  messagesWrap.innerHTML = '';

  // Re-show welcome card
  const wc = document.createElement('div');
  wc.className = 'welcome-card';
  wc.id = 'welcomeCard';
  wc.innerHTML = `
    <div class="welcome-fire">🔥</div>
    <div class="welcome-title">Welcome to RoastBot</div>
    <div class="welcome-sub">
      Tell me about yourself and I'll roast you into oblivion.
      The more info you give, the more personal the pain.
      Don't say I didn't warn you.
    </div>
    <div class="welcome-chips">
      <button class="welcome-chip wc-red"    onclick="quickStart('Roast me. I dare you.')">🎯 Roast Me</button>
      <button class="welcome-chip wc-orange" onclick="quickStart('My name is [your name] and I love [something embarrassing].')">📝 Intro</button>
      <button class="welcome-chip wc-gold"   onclick="quickStart('Say something nice... then immediately roast me.')">😬 Nice then Nasty</button>
    </div>`;
  messagesWrap.appendChild(wc);

  statusText.textContent = 'Ready to cook you alive';
  showToast('🔄 Conversation reset. Fresh pain awaits.');
});

/* ──────────────────────────────────────────
   INPUT EVENTS
──────────────────────────────────────────── */
chatInput.addEventListener('input', () => {
  const v = chatInput.value;
  charCount.textContent = v.length + ' / 400';
  sendBtn.disabled = v.trim().length === 0 || isTyping;
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage(chatInput.value);
  }
});

sendBtn.addEventListener('click', () => {
  if (!sendBtn.disabled) sendMessage(chatInput.value);
});

/* ──────────────────────────────────────────
   UTILS
──────────────────────────────────────────── */
function scrollToBottom() {
  messagesWrap.scrollTo({ top: messagesWrap.scrollHeight, behavior: 'smooth' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
</body>
</html>
